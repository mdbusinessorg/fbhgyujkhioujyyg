name: Atualizar vagas de Angola

on:
  schedule:
    - cron: '0 */3 * * *'  # a cada 3h para não perder vagas do mesmo dia
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Número máximo de páginas a raspar (padrão 50)'
        required: false
        default: '50'
      force:
        description: 'Forçar atualização mesmo sem novas vagas?'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: scrape-jobs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Recolher vagas (angolaemprego.com)
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '50' }}
          CONCURRENCY: '4'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node scripts/ingest-angolaemprego.mjs --json

      - name: Recolher vagas via RSS (same-day)
        env:
          CONCURRENCY: '4'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node scripts/ingest-rss.mjs

      - name: Recolher vagas do CareerJet (opcional)
        env:
          CAREERJET_API_KEY: ${{ secrets.CAREERJET_API_KEY }}
          CAREERJET_REFERER: 'https://mosalo.eu.cc/'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          node scripts/ingest-careerjet.mjs

      - name: Commit se houver alterações
        run: |
          git config user.name "mosalo-bot"
          git config user.email "bot@mosalo.eu.cc"
          git pull --rebase --autostash origin main
          git add public/external-jobs.json public/vagas-data
          if git diff --staged --quiet; then
            echo "Sem alterações nas vagas."
          else
            git commit -m "chore(vagas): atualização automática de vagas"
            git push
          fi

      - name: Upload artifact para depuração
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: |
            public/external-jobs.json
            public/vagas-data
