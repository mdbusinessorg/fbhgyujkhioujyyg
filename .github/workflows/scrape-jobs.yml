name: Atualizar vagas de Angola
on:
  schedule:
    - cron: '0 5 * * *' # diariamente às 05:00 UTC
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: scrape-jobs
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Recolher vagas (angolaemprego.com)
        env:
          MAX_PAGES: '30'
          CONCURRENCY: '4'
        run: node scripts/ingest-angolaemprego.mjs --json
      - name: Commit se houver alterações
        run: |
          git config user.name "mosalo-bot"
          git config user.email "bot@mosalo.eu.cc"
          git add public/external-jobs.json public/vagas-data
          if git diff --staged --quiet; then
            echo "Sem alterações nas vagas."
          else
            git commit -m "chore(vagas): atualização automática de vagas [skip ci]"
            git push
          fi
