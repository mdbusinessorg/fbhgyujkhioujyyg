<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MÔ SALO — Sem Ligação</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #EEF0FF 0%, #fff 100%);
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #1A56FF, #6C47FF);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon span {
      color: white;
      font-size: 28px;
      font-weight: bold;
    }
    h1 {
      font-size: 22px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    p {
      color: #666;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: #1A56FF;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1445DD; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><span>MS</span></div>
    <h1>Sem ligação à internet</h1>
    <p>Verifica a tua ligação Wi-Fi ou dados móveis e tenta novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
