[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/external-jobs.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

# API functions take priority over the SPA catch-all
[[redirects]]
  from = "/api/careerjet"
  to = "/.netlify/functions/careerjet"
  status = 200

[[redirects]]
  from = "/api/vagas"
  to = "/.netlify/functions/vagas"
  status = 200

[[redirects]]
  from = "/api/ai-cv"
  to = "/.netlify/functions/ai-cv"
  status = 200

[[redirects]]
  from = "/api/ai-tips"
  to = "/.netlify/functions/ai-tips"
  status = 200

[[redirects]]
  from = "/api/ai-match"
  to = "/.netlify/functions/ai-match"
  status = 200

[[redirects]]
  from = "/api/ai-support"
  to = "/.netlify/functions/ai-support"
  status = 200

[[redirects]]
  from = "/api/posts"
  to = "/.netlify/functions/posts"
  status = 200

[[redirects]]
  from = "/api/post-likes"
  to = "/.netlify/functions/post-likes"
  status = 200

[[redirects]]
  from = "/api/message-requests"
  to = "/.netlify/functions/message-requests"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
